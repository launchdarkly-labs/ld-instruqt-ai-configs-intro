title: Introduction to LaunchDarkly AI Configs
teaser: Ship AI features the same way you ship everything else — with control, observability,
  and a safety net.
description: |-
  AI Configs let you treat prompts, models, and rollout strategy
  as runtime configuration instead of code. In this track, you'll
  build a customer-facing AI assistant for the fictional ToggleWear
  storefront, iterate on its prompts and models without redeploying,
  target premium users to a more capable model, watch how it performs
  in production, and protect customers with a guarded rollout backed
  by an AI judge.
